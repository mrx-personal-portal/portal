<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
        }

        .header-section {
            /* --- Updated: Transparent Black Overlay --- */
            /* এখানে ঘনত্ব কমিয়ে 0.45 করা হয়েছে যাতে পেছনের ছবিটা একদম পরিষ্কার বোঝা যায় */
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #ffffff;
            padding: 120px 20px; /* স্পেসিং বাড়ানো হয়েছে যাতে লুকটা আরও লাক্সারি হয় */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 4px solid #e67e22; /* নিচে একটা মেকানিক্যাল অরেঞ্জ বর্ডার দেওয়া হলো */
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            /* লেখার পেছনে হালকা শ্যাডো যাতে হালকা ব্যাকগ্রাউন্ডেও পড়া যায় */
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8); 
        }

        .header-section p.designation {
            font-size: 1.6em;
            color: #ffffff;
            margin: 10px 0 0 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: capitalize;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1>Kishan Kumar Roy</h1>
        <p class="designation">Junior Engineer (Mechanical)</p>
    </header>

</body>
</html>
