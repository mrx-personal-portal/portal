<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
        }

        .header-section {
            /* --- Updated: Deeper Black Overlay added --- */
            /* We increase the alpha (0.75) for a darker, deeper feel */
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.8)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #ffffff; /* White text for contrast */
            padding: 100px 20px; /* Increased padding for better visual spacing */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.5em; /* Slightly larger name */
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5); /* Enhanced text shadow for maximum readability */
        }

        .header-section p.designation {
            font-size: 1.5em;
            color: #f1f1f1; /* Bright white/light-grey for designation */
            margin: 15px 0 0 0; /* Removed bottom margin */
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
        }
        
        /* Contact info styling is removed as requested from this section */
    </style>
</head>
<body>

    <header class="header-section">
        <h1>Kishan Kumar Roy</h1>
        <p class="designation">Junior Engineer (Mechanical)</p>
        
        </header>

</body>
</html>
