<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow: hidden;
        }

        /* Header Section (75% Height) */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-bottom: 5px solid #e67e22;
            position: relative;
        }

        /* --- Animation Logic --- */
        
        /* Kishan Kumar Roy Animation */
        .name-animated {
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            position: relative;
            display: block;
            /* Animation: Right to Left -> Wait -> Top to Bottom -> Loop */
            animation: kishanSequence 8s ease-in-out infinite;
        }

        /* Junior Engineer Animation */
        .title-animated {
            font-size: 1.6em;
            color: #f1f1f1;
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            position: relative;
            display: block;
            /* Animation: Left to Right -> Wait -> Bottom to Top -> Loop */
            animation: juniorSequence 8s ease-in-out infinite;
        }

        /* Keyframes for Kishan Kumar Roy */
        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(100%); } /* Start Right */
            15% { opacity: 1; transform: translateX(0); }   /* Move to Center */
            45% { opacity: 1; transform: translateX(0); }   /* Stay */
            60% { opacity: 0; transform: translateY(100px); } /* Drop Down */
            80% { opacity: 0; transform: translateX(100%); } /* Reset to Right */
            100% { opacity: 0; transform: translateX(100%); }
        }

        /* Keyframes for Junior Engineer */
        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-100%); } /* Start Left */
            20% { opacity: 1; transform: translateX(0); }    /* Move to Center (Slight delay) */
            50% { opacity: 1; transform: translateX(0); }    /* Stay */
            65% { opacity: 0; transform: translateY(-100px); } /* Slide Up */
            85% { opacity: 0; transform: translateX(-100%); }  /* Reset to Left */
            100% { opacity: 0; transform: translateX(-100%); }
        }

        .content-area {
            height: 25vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
            <span class="title-animated">Junior Engineer (Mechanical)</span>
        </div>
    </header>

    <div class="content-area">
        <p>Next steps: Professional Summary & Experience will appear here.</p>
    </div>

</body>
</html>
