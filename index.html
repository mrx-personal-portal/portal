<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Master Animation Fix)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Navbar: অরিজিনাল মাস্টার ডিজাইন --- */
        .navbar {
            position: absolute;
            top: 15px;
            width: 96%;
            left: 2%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            z-index: 2000;
        }

        .nav-links { display: flex; align-items: center; }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .cv-btn { background: #e67e22 !important; border: 1px solid #e67e22 !important; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        
        .login-container { position: absolute; right: 10px; }
        .login-btn { background: #007bff !important; color: white !important; border: 1px solid #007bff !important; font-weight: 700 !important; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4); }

        /* --- Header Section: Strictly 75% Height --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover; background-position: center;
            color: #ffffff; text-align: center; position: relative;
        }

        /* টেক্সট গ্রুপ পজিশনিং (250px Top Padding) */
        .header-content {
            padding-top: 250px; 
            max-width: 850px;
            padding-left: 20px;
            padding-right: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 5px; /* এই গ্যাপটি টাইটেল এবং ওয়েলকাম নোটকে খুব কাছে রাখবে */
        }

        /* --- Animation Logic: সিঙ্ক্রোনাইজড ১৪ সেকেন্ডের লুপ --- */
        .name-animated {
            font-size: 3.5em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            display: block;
            margin: 0;
            animation: kishanSequence 14s ease-in-out infinite;
        }

        .title-animated {
            font-size: 1.5em;
            color: #f1f1f1;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            display: block;
            margin: 0;
            animation: juniorSequence 14s ease-in-out infinite;
        }

        /* ওয়েলকাম নোট: এখন স্লাইডিং ছাড়া তোমার নামের মতো অ্যানিমেশন হবে */
        .welcome-msg {
            font-size: 1.05em;
            color: #e0e0e0;
            font-style: italic;
            line-height: 1.4;
            font-weight: 300;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            margin-top: 10px; /* সামান্য গ্যাপ যাতে মিশে না যায় */
            opacity: 0;
            display: block;
            animation: kishanSequence 14s ease-in-out infinite; /* তোমার নামের অ্যানিমেশন ফলো করছে */
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-150%); } 
            20%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        .content-area { height: 25vh; background: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Admin Dashboard</a>
            <a href="#">Contact</a>
            <a href="#" class="cv-btn">Download CV</a>
        </div>
        <div class="login-container">
            <a href="#" class="login-btn">LOGIN</a>
        </div>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
            <span class="title-animated">Junior Engineer (Mechanical)</span>
            <p class="welcome-msg">
                Welcome to the Professional Workspace of Kishan Kumar Roy. Dedicated to precision in Mechanical Engineering, innovative design, and seamless technical solutions.
            </p>
        </div>
    </header>

    <div class="content-area"></div>

</body>
</html>
