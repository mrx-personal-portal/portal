<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Master Final)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Updated Navbar for Error-Free Layout --- */
        .navbar {
            position: absolute;
            top: 15px;
            width: 96%;
            left: 2%;
            background: transparent;
            display: flex;
            justify-content: center; /* মাঝখানে মেইন মেনু */
            align-items: center;
            padding: 10px 0;
            z-index: 2000; /* নিশ্চিতভাবে সবকিছুর উপরে থাকবে */
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* CV Button: অরেঞ্জ হাইলাইট */
        .cv-btn {
            background: #e67e22 !important;
            border: 1px solid #e67e22 !important;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
        }

        /* LOGIN: টপ মোস্ট রাইট কর্নার ফিক্সড */
        .login-container {
            position: absolute;
            right: 10px; /* একদম কোণায় */
        }

        .login-btn {
            background: #007bff !important; /* ব্লু ব্যাকগ্রাউন্ড */
            color: white !important;       /* হোয়াইট লেটার */
            border: 1px solid #007bff !important;
            font-weight: 700 !important;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        .navbar a:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- Header Section: Strictly 75% Height (Unchanged) --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        /* তোমার প্রফেশনাল গ্যাপ (250px Padding) */
        .header-content {
            padding-top: 250px; 
            max-width: 850px;
            padding-left: 20px;
            padding-right: 20px;
            box-sizing: border-box;
        }

        /* --- Animation Logic: সেই অরিজিনাল ১৪ সেকেন্ডের লুপ --- */
        .name-animated {
            font-size: 3.5em;
            letter-spacing: 3px;
            font-weight: 800;
            animation: kishanSequence 14s ease-in-out infinite;
            display: block;
        }

        .title-animated {
            font-size: 1.5em;
            color: #f1f1f1;
            margin-top: 8px;
            animation: juniorSequence 14s ease-in-out infinite;
            display: block;
        }

        .welcome-msg {
            font-size: 1.05em;
            margin-top: 25px;
            font-style: italic;
            opacity: 0;
            animation: msgSequence 14s ease-in-out infinite;
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-150%); } 
            20%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes msgSequence {
            0%, 25% { opacity: 0; }
            35%, 75% { opacity: 1; }   
            85%, 100% { opacity: 0; transform: translateY(100px); }
        }

        .content-area {
            height: 25vh;
            background: white;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Admin Dashboard</a>
            <a href="#">Contact</a>
            <a href="#" class="cv-btn">Download CV</a>
        </div>
        
        <div class="login-container">
            <a href="#" class="login-btn">LOGIN</a>
        </div>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
            <span class="title-animated">Junior Engineer (Mechanical)</span>
            <p class="welcome-msg">
                Welcome to the Professional Workspace of Kishan Kumar Roy. Dedicated to precision in Mechanical Engineering, innovative design, and seamless technical solutions.
            </p>
        </div>
    </header>

    <div class="content-area"></div>

</body>
</html>
