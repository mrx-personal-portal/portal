<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Edit)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            position: absolute;
            top: 15px;
            width: 96%;
            left: 2%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* Download CV: অরেঞ্জ বাটন */
        .cv-btn {
            background: #e67e22 !important;
            border: 1px solid #e67e22 !important;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
        }

        /* --- Header Section (75% Height) --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* উপর থেকে শুরু হবে */
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            color: #ffffff;
            text-align: center;
            padding-top: 180px; /* নেভিগেশন বার থেকে নামকে নিচে নামানোর গ্যাপ */
        }

        .header-content {
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 5px; /* নাম, টাইটেল ও সামারি খুব কাছে রাখার জন্য */
        }

        /* --- Animations --- */
        .name-animated {
            font-size: 3.5em;
            font-weight: 800;
            animation: kishanSequence 14s infinite;
            margin: 0;
        }

        .title-animated {
            font-size: 1.5em;
            animation: juniorSequence 14s infinite;
            margin: 0;
            color: #f1f1f1;
        }

        .welcome-msg {
            font-size: 1.05em;
            margin-top: 15px;
            font-style: italic;
            opacity: 0;
            animation: msgSequence 14s infinite;
            line-height: 1.4;
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-150%); } 
            20%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes msgSequence {
            0%, 25% { opacity: 0; }
            35%, 75% { opacity: 1; }   
            85%, 100% { opacity: 0; transform: translateY(100px); }
        }

        /* --- Login Modal --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 30px;
            border-radius: 12px;
            width: 280px;
            text-align: center;
        }

        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .modal-content button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a onclick="showLogin('Admin Dashboard Access')">Admin Dashboard</a>
            <a href="#">Contact</a>
            <a href="#" class="cv-btn">Download CV</a>
        </div>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
