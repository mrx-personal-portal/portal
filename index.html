    <style>
        /* General Setup */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #2d3436;
            line-height: 1.6;
        }

        /* Professional Notification Bar */
        .notif-bar {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #3498db;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* Content Layout */
        .wrapper {
            max-width: 900px;
            margin: -50px auto 50px auto;
            padding: 0 20px;
        }
