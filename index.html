<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
        }

        .header-section {
            /* --- Updated: Background Image added --- */
            /* Please place image_0.png in the same folder as this HTML file. */
            background-image: linear-gradient(rgba(44, 62, 80, 0.7), rgba(44, 62, 80, 0.7)), 
                              url('image_0.png'); 
            background-size: cover; /* Background fills the whole area */
            background-position: center; /* Image centered */
            background-repeat: no-repeat;
            
            color: #ffffff;
            padding: 80px 20px; /* Slightly increased padding for better image visibility */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.2em; /* Slightly larger name */
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* Adds readability to text */
        }

        .header-section p.designation {
            font-size: 1.4em;
            color: #ecf0f1; /* Lighter grey-blue for designation */
            margin: 10px 0 35px 0;
            font-weight: 300;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px; /* Increased gap */
            font-size: 1.0em; /* Slightly larger contact info */
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15); /* More visible background for contact items */
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .contact-item span {
            color: #ecf0f1;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1>Kishan Kumar Roy</h1>
        <p class="designation">Junior Engineer (Mechanical)</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <span>📍 Bongaon, North 24 Parganas, WB</span>
            </div>
            <div class="contact-item">
                <span>📞 +91 9563790650</span>
            </div>
            <div class="contact-item">
                <span>📧 kishannbhs2002@gmail.com</span>
            </div>
        </div>
    </header>

</body>
</html>
