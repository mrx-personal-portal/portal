<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Updated Navigation: Button/Tab Look with Blur --- */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            padding: 40px 0;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            
            /* অপশনের ব্যাকগ্রাউন্ড এবং বর্ডার (গ্লাস লুক) */
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(8px); /* ব্যাকগ্রাউন্ড ঝাপসা করার জন্য */
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 25px;
            border-radius: 50px; /* পিল শেপ বাটন */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        /* মাউস নিলে কি হবে */
        .navbar a:hover {
            background: rgba(230, 126, 34, 0.8); /* আমাদের থিম অরেঞ্জ কালার */
            border-color: #e67e22;
            transform: translateY(-3px); /* সামান্য উপরে উঠে আসবে */
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.4);
        }

        /* --- Header Section (75% Height) --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        /* --- Animation Logic (Kishan's Custom Transitions) --- */
        .name-animated {
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            display: block;
            animation: kishanSequence 12s ease-in-out infinite;
        }

        .title-animated {
            font-size: 1.6em;
            color: #f1f1f1;
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            display: block;
            animation: juniorSequence 12s ease-in-out infinite;
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15% { opacity: 1; transform: translateX(0); }   
            65% { opacity: 1; transform: translateX(0); }   
            80% { opacity: 0; transform: translateY(150px); } 
            100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-150%); } 
            20% { opacity: 1; transform: translateX(0); }   
            65% { opacity: 1; transform: translateX(0); }   
            80% { opacity: 0; transform: translateY(150px); } 
            100% { opacity: 0; transform: translateY(150px); }
        }

        /* --- Login Modal --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        .modal-content input {
            width: 85%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .modal-content button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            width: 93%;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        .content-area {
            height: 25vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">Home</a>
        <a onclick="showLogin('Personal Documents')">Personal Docs</a>
        <a onclick="showLogin('Official Documents')">Official Docs</a>
        <a href="#">Contact</a>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
            <span class="title-animated">Junior Engineer (Mechanical)</span>
        </div>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Login</h3>
            <input type="text" placeholder="User ID">
            <input type="password" placeholder="Password">
            <button onclick="alert('Verification logic needed')">Access Files</button>
        </div>
    </div>

    <div class="content-area">
        <p>Scroll down for professional details.</p>
    </div>

    <script>
        function showLogin(title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('loginModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('loginModal').style.display = "none";
        }
    </script>

</body>
</html>
