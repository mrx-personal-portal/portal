<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
        }

        .header-section {
            /* অনলাইন ছবির লিঙ্ক যা সবাই দেখতে পাবে */
            background-image: linear-gradient(rgba(44, 62, 80, 0.7), rgba(44, 62, 80, 0.7)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.2em;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .header-section p.designation {
            font-size: 1.4em;
            color: #ecf0f1;
            margin: 10px 0 35px 0;
            font-weight: 300;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            font-size: 1.0em;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 5px;
            backdrop-filter: blur(5px); /* ঝাপসা ইফেক্ট যা প্রফেশনাল দেখায় */
        }

        .contact-item span {
            color: #ecf0f1;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1>Kishan Kumar Roy</h1>
        <p class="designation">Junior Engineer (Mechanical)</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <span>📍 Bongaon, North 24 Parganas, WB</span>
            </div>
            <div class="contact-item">
                <span>📞 +91 9563790650</span>
            </div>
            <div class="contact-item">
                <span>📧 kishannbhs2002@gmail.com</span>
            </div>
        </div>
    </header>

</body>
</html>
