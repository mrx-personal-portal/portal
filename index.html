<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Updated: Covering 75% (3/4th) of the screen --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* স্ক্রিনের উচ্চতার ৭৫ শতাংশ জায়গা নেবে */
            height: 75vh; 
            width: 100%;
            
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            color: #ffffff;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-bottom: 5px solid #e67e22;
        }

        /* Animation Container */
        .header-content {
            opacity: 0;
            transform: translateY(30px);
            animation: slideInFade 1.2s ease-out forwards;
        }

        @keyframes slideInFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8); 
        }

        .header-section p.designation {
            font-size: 1.6em;
            color: #ffffff;
            margin: 10px 0 0 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* Placeholder for the next section - just to see the gap */
        .next-section-preview {
            height: 300px;
            padding: 40px;
            text-align: center;
            color: #333;
            background-color: white;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <h1>Kishan Kumar Roy</h1>
            <p class="designation">Junior Engineer (Mechanical)</p>
        </div>
    </header>

    <div class="next-section-preview">
        <h2>Content will start from here...</h2>
        <p>This is the 25% area left for your details.</p>
    </div>

</body>
</html>
