<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Final)</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; overflow-x: hidden; }

        /* --- Navbar: অরিজিনাল K1 ডিজাইন --- */
        .navbar {
            position: absolute; top: 15px; width: 96%; left: 2%; background: transparent;
            display: flex; justify-content: center; align-items: center; padding: 10px 0; z-index: 1000;
        }

        .nav-links { display: flex; align-items: center; }

        .navbar a {
            color: white; text-decoration: none; margin: 0 10px; font-weight: 600; font-size: 0.82em;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* CV Button: অরিজিনাল অরেঞ্জ */
        .navbar a.cv-btn { background: #e67e22; border: 1px solid #e67e22; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        
        /* Login Button: একদম রাইট সাইডে এবং ব্লু */
        .login-container { position: absolute; right: 0; }
        .navbar a.main-login-btn { 
            background: #007bff; border: 1px solid #007bff; color: white; font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* --- Header: ছবি ৭৫% কভার করবে এবং টেক্সট গ্যাপ ফিক্সড --- */
        .header-section {
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            height: 75vh; width: 100%; position: relative;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover; background-position: center; color: #ffffff; text-align: center;
            padding-top: 180px; /* নেভিগেশন বার থেকে গ্যাপ */
        }

        .header-content { max-width: 850px; }

        /* নাম, পদবি এবং সামারি ক্লোজলি সাজানো */
        .name-animated { font-size: 3.5em; font-weight: 800; animation: kishanSequence 14s infinite; display: block; margin-bottom: 5px; }
        .title-animated { font-size: 1.5em; animation: juniorSequence 14s infinite; display: block; color: #f1f1f1; margin-bottom: 15px; }
        .welcome-msg { font-size: 1.05em; font-style: italic; opacity: 0; animation: msgSequence 14s infinite; line-height: 1.4; }

        @keyframes kishanSequence { 0% { opacity: 0; transform: translateX(150%); } 15%, 75% { opacity: 1; transform: translateX(0); } 85%, 100% { opacity: 0; transform: translateY(150px); } }
        @keyframes juniorSequence { 0% { opacity: 0; transform: translateX(-150%); } 20%, 75% { opacity: 1; transform: translateX(0); } 85%, 100% { opacity: 0; transform: translateY(150px); } }
        @keyframes msgSequence { 0%, 25% { opacity: 0; } 35%, 75% { opacity: 1; } 85%, 100% { opacity: 0; transform: translateY(100px); } }

        /* --- Admin Dashboard Style --- */
        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f9; z-index: 5000; padding: 40px; overflow-y: auto; color: #333; }
        .admin-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .admin-card input, .admin-card textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #27ae60; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: white; margin: 12% auto; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a onclick="showLogin()">Personal Docs</a>
            <a onclick="showLogin()">Official Docs</a>
            <a href="#">Contact</a>
            <a href="#" id="cvLink" download class="cv-btn">Download CV</a>
        </div>
        <div class="login-container">
            <a onclick="showLogin()" class="main-login-btn">LOGIN</a>
        </div>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated" id="dispName">Kishan Kumar Roy</span>
            <span class="title-animated" id="dispTitle">Junior Engineer (Mechanical)</span>
            <p class="welcome-msg" id="dispWelcome">
                Welcome to the Professional Workspace of Kishan Kumar Roy. Dedicated to precision in Mechanical Engineering, innovative design, and seamless technical solutions.
            </p>
        </div>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">LOGIN</h3>
            <input type="text" id="userInput" placeholder="User ID" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
            <button onclick="checkAccess()" style="width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SUBMIT</button>
            <button onclick="closeModal()" style="background:none; border:none; color:red; cursor:pointer; margin-top:15px;">Close</button>
        </div>
    </div>

    <div id="adminDashboard" class="admin-panel">
        <div class="admin-card">
            <h2>K1 Admin Control</h2>
            <label>Name:</label>
            <input type="text" id="editName">
            <label>Designation:</label>
            <input type="text" id="editTitle">
            <label>Message:</label>
            <textarea id="editWelcome" rows="5"></textarea>
            <button class="save-btn" onclick="saveData()">SAVE & UPDATE SITE</button>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; width:100%; margin-top:10px;">Exit</button>
        </div>
    </div>

    <script>
        const ID = "kishan_admin";
        const PASS = "kishan@650";

        function showLogin() { document.getElementById('loginModal').style.display = "block"; }
        function closeModal() { document.getElementById('loginModal').style.display = "none"; }

        function checkAccess() {
            if(document.getElementById('userInput').value === ID && document.getElementById('passInput').value === PASS) {
                document.getElementById('loginModal').style.display = "none";
                document.getElementById('adminDashboard').style.display = "block";
                document.getElementById('editName').value = document.getElementById('dispName').innerText;
                document.getElementById('editTitle').value = document.getElementById('dispTitle').innerText;
                document.getElementById('editWelcome').value = document.getElementById('dispWelcome').innerText;
            } else { alert("Wrong ID/Password!"); }
        }

        function saveData() {
            localStorage.setItem('k_n', document.getElementById('editName').value);
            localStorage.setItem('k_t', document.getElementById('editTitle').value);
            localStorage.setItem('k_w', document.getElementById('editWelcome').value);
            location.reload();
        }

        window.onload = function() {
            if(localStorage.getItem('k_n')) document.getElementById('dispName').innerText = localStorage.getItem('k_n');
            if(localStorage.getItem('k_t')) document.getElementById('dispTitle').innerText = localStorage.getItem('k_t');
            if(localStorage.getItem('k_w')) document.getElementById('dispWelcome').innerText = localStorage.getItem('k_w');
        };
    </script>
</body>
</html>
