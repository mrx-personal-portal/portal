<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
        }

        .header-section {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-section h1 {
            margin: 0;
            font-size: 2.8em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-section p.designation {
            font-size: 1.2em;
            color: #bdc3c7;
            margin: 10px 0 25px 0;
            font-weight: 300;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.95em;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 5px;
        }

        .contact-item span {
            color: #ecf0f1;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1>Kishan Kumar Roy</h1>
        <p class="designation">Junior Engineer (Mechanical)</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <span>📍 Bongaon, North 24 Parganas, WB</span>
            </div>
            <div class="contact-item">
                <span>📞 +91 9563790650</span>
            </div>
            <div class="contact-item">
                <span>📧 kishannbhs2002@gmail.com</span>
            </div>
        </div>
    </header>

</body>
</html>
