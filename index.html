<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Navigation: Glassmorphism style at the top --- */
        .navbar {
            position: absolute;
            top: 10px;
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        .navbar a:hover {
            background: rgba(230, 126, 34, 0.8);
            border-color: #e67e22;
            transform: translateY(-2px);
        }

        /* --- Header Section (75% Height) --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        .header-content {
            margin-top: 50px; 
            max-width: 800px;
            padding: 0 20px;
        }

        /* --- Animation Logic --- */
        .name-animated {
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            display: block;
            animation: kishanSequence 12s ease-in-out infinite;
        }

        .title-animated {
            font-size: 1.6em;
            color: #f1f1f1;
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            display: block;
            animation: juniorSequence 12s ease-in-out infinite;
        }

        /* --- New Welcome Message Style --- */
        .welcome-msg {
            font-size: 1.1em;
            color: #e0e0e0;
            margin-top: 25px;
            font-style: italic;
            line-height: 1.6;
            font-weight: 300;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            animation: msgSequence 12s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15% { opacity: 1; transform: translateX(0); }   
            65% { opacity: 1; transform: translateX(0); }   
            80% { opacity: 0; transform: translateY(150px); } 
            100% { opacity: 0; transform: translateY(150px); }
        }
