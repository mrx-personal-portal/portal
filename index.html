<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Fixed)</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; overflow-x: hidden; }

        /* --- Navbar --- */
        .navbar {

        }

        .nav-links a {
            color: white; text-decoration: none; margin: 0 10px; font-weight: 600; font-size: 0.82em;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .cv-btn { background: #e67e22 !important; border: 1px solid #e67e22 !important; }
        
        .login-container { position: absolute; right: 0; }
        .main-login-btn { 
            background: #007bff !important; color: white; border: none; padding: 10px 25px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* --- Header Section (Strictly 75% Height) --- */
        .header-section {
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            height: 75vh; width: 100%; position: relative;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover; background-position: center; color: #ffffff; text-align: center;
            padding-top: 180px; /* নেভিগেশন বার থেকে নামকে নিচে নামানোর জন্য গ্যাপ */
        }

        /* --- Text Grouping: Name, Title, and Summary Close Together --- */
        .header-content {
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 5px; /* এই গ্যাপটি নাম, টাইটেল আর সামারিকে খুব কাছে রাখবে */
        }

        .name-animated { font-size: 3.5em; font-weight: 800; animation: kishanSequence 14s infinite; margin: 0; }
        .title-animated { font-size: 1.5em; animation: juniorSequence 14s infinite; margin: 0; color: #f1f1f1; }
        
        .welcome-msg { 
            font-size: 1.05em; margin-top: 15px; /* টাইটেল থেকে সামান্য দূরত্ব */

            line-height: 1.4; 
        }
