<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Admin)</title>
    <style>
        /* আগের সমস্ত স্টাইল একই থাকবে */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; overflow-x: hidden; }
        
        .navbar {
            position: absolute; top: 15px; width: 96%; left: 2%; background: transparent;
            display: flex; justify-content: center; align-items: center; padding: 10px 0; z-index: 1000;
        }

        .nav-links { display: flex; align-items: center; }

        .navbar a {
            color: white; text-decoration: none; margin: 0 8px; font-weight: 600; font-size: 0.82em;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); padding: 10px 18px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease;
        }

        /* Admin Dashboard Highlight */
        .navbar a.admin-btn { background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; color: #3498db; }

        .navbar a.cv-btn { background: #e67e22; border: 1px solid #e67e22; color: white; }

        .login-container { position: absolute; right: 0; }
        .navbar a.main-login-btn { background: #007bff; border: 1px solid #007bff; color: white; font-weight: 700; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 30px; border-radius: 12px; width: 320px; text-align: center; position: relative; }
        .modal-content input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .modal-content button { background-color: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px; }
        .close-btn { position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 24px; color: #333; }
        
        /* Dashboard Content Area */
        #dashboardPanel { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
        
        /* Header & Animations (Same as K1) */
        .header-section { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 75vh; width: 100%; background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; color: white; text-align: center; position: relative; }
        .name-animated { font-size: 3.5em; font-weight: 800; animation: kishanSequence 14s infinite; }
        @keyframes kishanSequence { 0% { opacity: 0; transform: translateX(150%); } 15%, 75% { opacity: 1; transform: translateX(0); } 85%, 100% { opacity: 0; transform: translateY(150px); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="javascript:void(0)" onclick="openAdminModal()" class="admin-btn">Admin Dashboard</a>
            <a href="javascript:void(0)" onclick="showLogin('Personal Documents')">Personal Docs</a>
            <a href="javascript:void(0)" onclick="showLogin('Official Documents')">Official Docs</a>
            <a href="#">Contact</a>
            <a href="#" download="Kishan_Kumar_Roy_CV" class="cv-btn">Download CV</a>
        </div>
        <div class="login-container">
            <a href="javascript:void(0)" onclick="showLogin('User Login')" class="main-login-btn">Login</a>
        </div>
    </nav>

    <header class="header-section">
        <div class="header-content">
            <span class="name-animated">Kishan Kumar Roy</span>
            <p>Junior Engineer (Mechanical)</p>
        </div>
    </header>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAdminModal()">&times;</span>
            <h3>Admin Access</h3>
            
            <div id="adminLoginForm">
                <input type="text" id="adminUser" placeholder="Admin ID">
                <input type="password" id="adminPass" placeholder="Admin Password">
                <button onclick="verifyAdmin()">Enter Dashboard</button>
            </div>

            <div id="dashboardPanel">
                <h4 style="color: #2c3e50;">Dashboard active</h4>
                <p style="font-size: 0.8em;">Change site settings or credentials below:</p>
                <input type="text" id="newWebPass" placeholder="Change Website Password">
                <button style="background-color: #27ae60;" onclick="saveChanges()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- কোড থেকে অ্যাডমিন আইডি এবং পাসওয়ার্ড সেট করার জায়গা ---
        const MASTER_ADMIN_ID = "kishan_admin"; 
        const MASTER_ADMIN_PASS = "kishan@650"; 

        function openAdminModal() {
            document.getElementById('adminModal').style.display = "block";
            document.getElementById('adminLoginForm').style.display = "block";
            document.getElementById('dashboardPanel').style.display = "none";
        }

        function verifyAdmin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            if (user === MASTER_ADMIN_ID && pass === MASTER_ADMIN_PASS) {
                document.getElementById('adminLoginForm').style.display = "none";
                document.getElementById('dashboardPanel').style.display = "block";
            } else {
                alert("অ্যাডমিন এক্সেস ডিনাইড! সঠিক আইডি ও পাসওয়ার্ড দিন।");
            }
        }

        function saveChanges() {
            alert("পরিবর্তনগুলো সফলভাবে সেভ হয়েছে!");
            closeAdminModal();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = "none";
        }

        function showLogin(title) { alert(title + " Login logic here."); }

        window.onclick = function(event) {
            if (event.target == document.getElementById('adminModal')) { closeAdminModal(); }
        }
    </script>
</body>
</html>
