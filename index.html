<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Header Section (75% of screen) --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 75vh; 
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-bottom: 5px solid #e67e22;
        }

        /* --- Continuous Floating Animation Container --- */
        .header-content {
            /* শুরুতে নিচ থেকে আসবে (১.৫ সেকেন্ডে) */
            animation: initialSlide 1.5s ease-out forwards, 
                       continuousFloat 4s ease-in-out infinite alternate; /* তারপর সারাক্ষণ ভাসবে */
            animation-delay: 0s, 1.5s; /* স্লাইড শেষ হওয়ার পর ফ্লোটিং শুরু হবে */
        }

        /* প্রথমবার স্ক্রিনে আসার অ্যানিমেশন (ধীরগতিতে) */
        @keyframes initialSlide {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* সারাক্ষণ মৃদুভাবে ভাসার অ্যানিমেশন (Breathing Effect) */
        @keyframes continuousFloat {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-15px); /* ৫ সেকেন্ড ধরে আলতো করে ১৫ পিক্সেল উপরে-নিচে হবে */
            }
        }

        .header-section h1 {
            margin: 0;
            font-size: 3.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8); 
        }

        .header-section p.designation {
            font-size: 1.6em;
            color: #f1f1f1;
            margin: 10px 0 0 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        /* Preview for the area below the image */
        .content-area {
            height: 300px;
            background: white;
            text-align: center;
            padding-top: 50px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <h1>Kishan Kumar Roy</h1>
            <p class="designation">Junior Engineer (Mechanical)</p>
        </div>
    </header>

    <div class="content-area">
        <h2>Professional Journey Starts Below</h2>
        <p>Your qualifications and skills will be added here in the next step.</p>
    </div>

</body>
</html>
