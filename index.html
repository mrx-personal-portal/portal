<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kishan Kumar Roy - Portfolio (K1 Original Base)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* --- Navbar: অরিজিনাল পজিশন --- */
        .navbar {
            position: absolute;
            top: 15px;
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        /* Download CV: অরেঞ্জ হাইলাইট বাটন */
        .cv-btn {
            background: #e67e22 !important;
            border: 1px solid #e67e22 !important;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
        }

        .navbar a:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- Header Section: একদম সেই অরিজিনাল ৭৫% হাইট --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 75vh; /* সকালের অরিজিনাল কোড অনুযায়ী ৭৫% */
            width: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                              url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        .header-content {
            margin-top: 60px; 
            max-width: 850px;
            padding: 0 20px;
        }

        /* --- Animation Logic: অরিজিনাল ১৪ সেকেন্ডের লুপ --- */
        .name-animated {
            font-size: 3.5em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            display: block;
            animation: kishanSequence 14s ease-in-out infinite;
        }

        .title-animated {
            font-size: 1.5em;
            color: #f1f1f1;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            display: block;
            animation: juniorSequence 14s ease-in-out infinite;
        }

        .welcome-msg {
            font-size: 1.05em;
            color: #e0e0e0;
            margin-top: 25px;
            font-style: italic;
            line-height: 1.6;
            font-weight: 300;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            opacity: 0;
            animation: msgSequence 14s ease-in-out infinite;
        }

        @keyframes kishanSequence {
            0% { opacity: 0; transform: translateX(150%); } 
            15%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes juniorSequence {
            0% { opacity: 0; transform: translateX(-150%); } 
            20%, 75% { opacity: 1; transform: translateX(0); }   
            85%, 100% { opacity: 0; transform: translateY(150px); }
        }

        @keyframes msgSequence {
            0%, 25% { opacity: 0; transform: scale(0.9); }
            35%, 75% { opacity: 1; transform: scale(1); }   
            85%, 100% { opacity: 0; transform: translateY(100px); }
        }

        /* Modal Settings */
        .modal {
            display: none; 
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 30px;
            border-radius: 12px;
            width: 280px;
            text-align: center;
        }

        .content-area {
            height: 25vh; /* নিচের সাদা অংশ */
            background: white;
        }
    </
